name: regime-radar daily

# Cron jalan 22:30 UTC Sun-Thu = 05:30 WIB Mon-Fri pagi.
# Hari-of-week 0-4 (bukan 1-5) supaya UTC Sunday → WIB Monday morning refresh
# tetap ter-cover. Cron 1-5 sebelumnya keliru: skip Minggu UTC → Senin WIB stale.
# workflow_dispatch supaya bisa di-trigger manual dari UI.
#
# Catatan loop: workflow ini TIDAK trigger pada push, jadi commit dari workflow ini
# tidak men-trigger ulang dirinya sendiri. Tapi push akan trigger hugo.yaml — yang
# memang kita mau, supaya Pages re-deploy dengan data baru. Self-healing.

on:
  schedule:
    - cron: "30 22 * * 0-4"
  workflow_dispatch: {}

permissions:
  contents: write  # untuk git push hasil

concurrency:
  group: regime-radar
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tools/regime_radar/requirements.txt

      - name: Install deps
        run: pip install -r tools/regime_radar/requirements.txt

      - name: Build payloads
        run: python -m tools.regime_radar.build

      - name: Commit & push (only if data changed)
        run: |
          if git diff --quiet -- static/data/regime-radar/; then
            echo "No data changes; nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static/data/regime-radar/
          git commit -m "data: regime-radar refresh ($(date -u +%Y-%m-%d))"
          git push
