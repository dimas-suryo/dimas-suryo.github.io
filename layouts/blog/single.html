{{ define "main" }}
<main>
  <article class="blog-post">
    <header>
      <h1>{{ .Title }}</h1>
      <p class="date">{{ .Date.Format "January 2, 2006" }}</p>
    </header>
    <div class="content">{{ .Content }}</div>
    <footer class="post-footer">
      <a href="/blog/">← Back to all posts</a>
    </footer>
  </article>
</main>
{{ end }}
