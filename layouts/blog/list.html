{{ define "main" }}
<main>
  <section id="blog-list">
    <h1>Blog</h1>
    <p class="blog-intro">
      Long-form essays di persimpangan financial markets, systems thinking, dan
      apa pun yang sedang menarik perhatian saya. Updated occasionally (atau
      barely).
    </p>
    <ul class="blog-cards">
      {{ range .Pages.ByDate.Reverse }} ... {{ end }}
    </ul>
  </section>
</main>
{{ end }}
